stages:
  - check
  - preview
  - promote
  - production
  - verify
  - rollback
  - docs

default:
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - adsai/node_modules/
      - adsai/.next/cache/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# =============================================================================
# 0. DOCUMENTATION (Generate & Deploy)
# =============================================================================

pages:
  stage: docs
  script:
    - cd adsai
    - npm ci
    - npx typedoc --options ../typedoc-md.json
    - npx typedoc --options ../typedoc-html.json

  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual

# =============================================================================
# 1. CHECK (Tests & Linting)
# =============================================================================
test_suite:
  stage: check
  script:
    - cd adsai 
    - npm ci
    - echo "Running Tests & Linting..."
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# =============================================================================
# 2. PREVIEW & NOTIFY (Runs on MR)
# =============================================================================
deploy_preview:
  stage: preview
  environment:
    name: review/$CI_MERGE_REQUEST_IID
    url: $PREVIEW_URL
    on_stop: stop_preview
  before_script:
    - npm install --global vercel
  script:
    - vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
    - vercel build --token=$VERCEL_TOKEN
    - export PREVIEW_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
    - echo "Deploying to $PREVIEW_URL"
    - echo "$PREVIEW_URL" > preview_url.txt
  artifacts:
    paths:
      - preview_url.txt
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

notify_mr:
  stage: preview
  image: curlimages/curl:latest
  needs: ["deploy_preview"]
  script:
    - export PREVIEW_URL=$(cat preview_url.txt)
    # FIX: We use printf and wrap everything in single quotes to satisfy GitLab parser
    - 'printf "{\"body\":\"🚀 **Deploy Preview Ready!**\n\nVisit your changes here: %s\"}" "$PREVIEW_URL" > payload.json'
    - 'curl --request POST --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" --header "Content-Type: application/json" --data "@payload.json" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stop_preview:
  stage: preview
  script:
    - echo "Stopping preview environment"
  environment:
    name: review/$CI_MERGE_REQUEST_IID
    action: stop
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

# =============================================================================
# 3. PROMOTE (Dev -> Main | Manual Trigger)
# =============================================================================
promote_to_main:
  stage: promote
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh-client
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
    - git remote set-url origin https://oauth2:$GITLAB_API_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git
  script:
    - echo "🚀 Promoting Dev to Main..."
    - git fetch origin main
    - git checkout main
    # FIX: Wrapped in single quotes so the colon in "CI: Promote" doesn't break the YAML
    - 'git merge $CI_COMMIT_SHA --no-edit -m "CI: Promote dev to main"'
    - git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual
      allow_failure: false

# =============================================================================
# 4. PRODUCTION (Deploy -> Verify -> Rollback)
# =============================================================================
deploy_production:
  stage: production
  environment:
    name: production
    url: https://ads-ai-navy.vercel.app
  before_script:
    - npm install --global vercel
  script:
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

health_check:
  stage: verify
  image: curlimages/curl:latest
  script:
    - echo "⏳ Waiting for Vercel propagation..."
    - sleep 15
    - echo "🔍 Checking production health..."
    # FIX: Wrapped in single quotes
    - 'curl --fail --output /dev/null --silent --head --write-out "HTTP Status: %{http_code}\n" "https://ads-ai-navy.vercel.app"'
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

auto_rollback:
  stage: rollback
  image: node:20
  needs: ["health_check"]
  before_script:
    - npm install --global vercel
  script:
    - echo "🚨 Health Check Failed! Initiating Automated Rollback..."
    - vercel rollback --yes --token=$VERCEL_TOKEN
  when: on_failure
  rules:
    - if: $CI_COMMIT_BRANCH == "main"