<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New List | CineLog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neutral: {
                            850: '#1f1f1f',
                            900: '#171717',
                            950: '#0a0a0a', 
                        },
                        brand: {
                            400: '#4ade80', 
                            500: '#22c55e',
                            600: '#16a34a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans antialiased selection:bg-brand-500 selection:text-black pb-24">

    <nav class="fixed top-0 w-full z-50 bg-neutral-950/90 backdrop-blur-md border-b border-neutral-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 bg-brand-500 rounded-md flex items-center justify-center text-black font-bold text-lg">C</div>
                    <span class="text-xl font-bold tracking-tight group-hover:text-brand-400 transition-colors">CineLog</span>
                </a>
                 <div class="flex items-center gap-4">
                     <a href="/lists.html" class="text-neutral-400 hover:text-white transition-colors text-sm font-medium">
                        <i class="fa-solid fa-xmark mr-2"></i> Exit Editor
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 space-y-12">

        <header class="space-y-6">
            
            <div>
                <input type="text" 
                       placeholder="Name your list..." 
                       class="w-full bg-transparent border-none p-0 text-4xl md:text-5xl font-black text-white placeholder-neutral-600 focus:ring-0 outline-none"
                       autofocus>
            </div>

            <div>
                <textarea rows="3" 
                          class="w-full bg-neutral-900/50 border border-neutral-800 rounded-lg p-4 text-sm text-neutral-200 focus:ring-1 focus:ring-brand-500 focus:border-brand-500 outline-none resize-none placeholder-neutral-500 font-mono" 
                          placeholder="Add a description (Markdown supported)..."></textarea>
            </div>

             <div class="flex items-center justify-between bg-neutral-900/50 border border-neutral-800 p-4 rounded-lg">
                <div>
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-lock-open text-neutral-400"></i> Public List
                    </h3>
                    <p class="text-xs text-neutral-500">Anyone can see this list on your profile.</p>
                </div>
                 <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" value="" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-neutral-700 peer-focus:outline-none rounded-full peer dark:bg-neutral-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-brand-500"></div>
                </label>
            </div>

        </header>

        <hr class="border-neutral-800">

        <section class="flex flex-col md:flex-row gap-8 relative">

            <div class="w-full md:w-5/12 relative z-20">
                <h3 class="text-sm font-bold text-neutral-300 uppercase tracking-wider mb-4">Find Films</h3>
                
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-neutral-500"></i>
                    <input type="text" 
                           placeholder="Search to add..." 
                           class="w-full bg-neutral-900 border border-neutral-800 text-white rounded-lg pl-12 pr-4 py-3 outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                           value="Mad Max"> <div class="absolute top-full left-0 w-full mt-2 bg-neutral-900 border border-neutral-800 rounded-xl shadow-2xl overflow-hidden z-30 ring-1 ring-white/5">
                        <ul>
                            <li class="flex items-center gap-3 p-3 hover:bg-neutral-800 cursor-pointer transition-colors border-b border-neutral-800/50 group">
                                <img src="https://placehold.co/45x65/222/fff?text=Fury+Road" class="w-10 h-14 rounded-sm object-cover shadow-sm">
                                <div class="flex-1 min-w-0">
                                    <h4 class="text-sm font-medium text-white truncate">Mad Max: Fury Road</h4>
                                    <span class="text-xs text-neutral-500">2015</span>
                                </div>
                                <button class="w-8 h-8 rounded-full bg-neutral-950 border border-neutral-800 text-neutral-400 group-hover:text-brand-400 group-hover:border-brand-500 flex items-center justify-center transition-all">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </li>
                            <li class="flex items-center gap-3 p-3 hover:bg-neutral-800 cursor-pointer transition-colors group">
                                <img src="https://placehold.co/45x65/333/fff?text=Furiosa" class="w-10 h-14 rounded-sm object-cover shadow-sm">
                                <div class="flex-1 min-w-0">
                                    <h4 class="text-sm font-medium text-white truncate">Furiosa: A Mad Max Saga</h4>
                                    <span class="text-xs text-neutral-500">2024</span>
                                </div>
                                 <button class="w-8 h-8 rounded-full bg-neutral-950 border border-neutral-800 text-neutral-400 group-hover:text-brand-400 group-hover:border-brand-500 flex items-center justify-center transition-all">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-7/12">
                <div class="flex items-center justify-between mb-4">
                     <h3 class="text-sm font-bold text-neutral-300 uppercase tracking-wider">List Items <span class="text-neutral-500">(3)</span></h3>
                     <span class="text-xs text-neutral-500">Drag to reorder</span>
                </div>

                <div class="space-y-3">

                    <div class="flex items-center gap-4 bg-neutral-900/80 border border-neutral-800 rounded-lg p-3 group hover:border-neutral-700 hover:bg-neutral-900 transition-all relative">
                        <div class="text-neutral-600 cursor-grab hover:text-neutral-400 px-1">
                            <i class="fa-solid fa-grip-vertical"></i>
                        </div>
                        <div class="text-lg font-bold text-neutral-500 w-6 text-center">1</div>
                        <img src="https://placehold.co/45x65/111/fff?text=The+Thing" class="w-10 h-14 rounded-sm object-cover shadow-sm border border-neutral-800">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold text-white truncate">The Thing</h4>
                            <span class="text-xs text-neutral-500">1982</span>
                        </div>
                        <button class="text-neutral-500 hover:text-red-500 p-2 transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-4 bg-neutral-900/80 border border-neutral-800 rounded-lg p-3 group hover:border-neutral-700 hover:bg-neutral-900 transition-all relative">
                        <div class="text-neutral-600 cursor-grab hover:text-neutral-400 px-1">
                            <i class="fa-solid fa-grip-vertical"></i>
                        </div>
                        <div class="text-lg font-bold text-neutral-500 w-6 text-center">2</div>
                        <img src="https://placehold.co/45x65/222/fff?text=Alien" class="w-10 h-14 rounded-sm object-cover shadow-sm border border-neutral-800">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold text-white truncate">Alien</h4>
                            <span class="text-xs text-neutral-500">1979</span>
                        </div>
                        <button class="text-neutral-500 hover:text-red-500 p-2 transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                     <div class="flex items-center gap-4 bg-neutral-900/80 border border-neutral-800 rounded-lg p-3 group hover:border-neutral-700 hover:bg-neutral-900 transition-all relative">
                        <div class="text-neutral-600 cursor-grab hover:text-neutral-400 px-1">
                            <i class="fa-solid fa-grip-vertical"></i>
                        </div>
                        <div class="text-lg font-bold text-neutral-500 w-6 text-center">3</div>
                        <img src="https://placehold.co/45x65/333/fff?text=The+Fly" class="w-10 h-14 rounded-sm object-cover shadow-sm border border-neutral-800">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold text-white truncate">The Fly</h4>
                            <span class="text-xs text-neutral-500">1986</span>
                        </div>
                        <button class="text-neutral-500 hover:text-red-500 p-2 transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                </div>
            </div>

        </section>

    </main>

    <div class="fixed bottom-0 inset-x-0 bg-neutral-950/90 backdrop-blur-md border-t border-neutral-800 p-4 z-50">
        <div class="max-w-5xl mx-auto flex items-center justify-end gap-4">
            <span class="text-xs text-neutral-500 mr-auto hidden sm:block">Last saved 2 minutes ago...</span>
            
            <button class="px-6 py-2.5 rounded-lg text-sm font-medium text-neutral-300 hover:text-white hover:bg-neutral-800 transition-colors">
                Cancel
            </button>
            <button class="px-6 py-2.5 rounded-lg text-sm font-bold text-black bg-brand-500 hover:bg-brand-400 shadow-[0_0_15px_rgba(34,197,94,0.2)] transition-all active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> Save List
            </button>
        </div>
    </div>

</body>
</html>
